<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page || Movie</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>

</head>

<body>

    <div id="bg-container"></div>

    <div id="app">
        <header>
            <div class="logo">
                <span class="logo-badge">NEW</span>
                <span>MOVIE</span>
            </div>
            <div class="search-wrap">
                <svg width="16" height="16" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="search-input" placeholder="Search..." />
            </div>
        </header>

        <main>

            <div class="movie-info">
                <h1 class="movie-title" id="movie-title"></h1>
                <div class="meta-row" id="meta-row"></div>
                <p class="movie-desc" id="movie-desc"></p>
            </div>
            <div class="carousel-controls">
                <button class="ctrl-btn" id="btn-left" aria-label="Scroll left">
                    <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                        <polyline points="15 18 9 12 15 6" />
                    </svg>
                </button>
                <button class="ctrl-btn" id="btn-right" aria-label="Scroll right">
                    <svg width="18" height="18" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
                        <polyline points="9 18 15 12 9 6" />
                    </svg>
                </button>
            </div>
            <div class="carousel-section">
                <div id="state-msg">
                    <span class="state-icon">🎬</span>
                    <span id="state-text">Loading...</span>
                </div>
                <div id="carousel"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
